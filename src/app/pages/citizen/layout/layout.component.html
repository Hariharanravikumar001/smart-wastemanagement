<div class="db-layout" [class.sidebar-collapsed]="sidebarCollapsed">
  <!-- SIDEBAR -->
  <aside class="db-sidebar">
    <div class="db-sidebar-glow"></div>
    
    <div class="db-sidebar-header">
      <div class="db-brand">
        <div class="db-brand-icon-wrap">♻️</div>
        <span class="db-brand-name" *ngIf="!sidebarCollapsed">SmartWaste</span>
      </div>
      <button class="db-toggle-btn" (click)="toggleSidebar()">
        {{ sidebarCollapsed ? '→' : '←' }}
      </button>
    </div>

    <!-- User Profile Summary in Sidebar -->
    <div class="db-user-block" *ngIf="!sidebarCollapsed">
      <div class="db-avatar">
        {{ currentUser?.name?.charAt(0) || 'C' }}
      </div>
      <div class="db-user-info">
        <div class="db-user-name">{{ currentUser?.name }}</div>
        <div class="db-user-handle">{{ "@" }}{{ currentUser?.username }}</div>
        <div class="db-role-chip">
          <span>🛡️</span> Citizen
        </div>
      </div>
    </div>
    <div class="db-avatar-mini" *ngIf="sidebarCollapsed">
      {{ currentUser?.name?.charAt(0) || 'C' }}
    </div>

    <!-- Navigation -->
    <nav class="db-nav">
      <div class="db-nav-section" *ngIf="!sidebarCollapsed">Menu</div>
      
      <a routerLink="/citizen/dashboard" routerLinkActive="active" class="db-nav-item">
        <span class="db-nav-icon">📊</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">Dashboard</span>
      </a>

      <a routerLink="/citizen/pickup-request" routerLinkActive="active" class="db-nav-item">
        <span class="db-nav-icon">🚛</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">Schedule Pickup</span>
      </a>

      <a routerLink="/citizen/pickup-history" routerLinkActive="active" class="db-nav-item">
        <span class="db-nav-icon">📜</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">Pickup History</span>
      </a>

      <div class="db-nav-divider"></div>
      <div class="db-nav-section" *ngIf="!sidebarCollapsed">Analytics</div>

      <a routerLink="/citizen/statistics" routerLinkActive="active" class="db-nav-item">
        <span class="db-nav-icon">📈</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">Waste Stats</span>
      </a>

      <div class="db-nav-divider"></div>
      <div class="db-nav-section" *ngIf="!sidebarCollapsed">Account</div>

      <a routerLink="/citizen/messages" routerLinkActive="active" class="db-nav-item">
        <span class="db-nav-icon">💬</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">Messages</span>
        <span class="db-badge" *ngIf="!sidebarCollapsed">3</span>
      </a>

      <a routerLink="/citizen/profile" routerLinkActive="active" class="db-nav-item">
        <span class="db-nav-icon">👤</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">My Profile</span>
      </a>
    </nav>

    <!-- Sidebar Footer -->
    <div class="db-sidebar-footer">
      <button class="db-theme-toggle" (click)="toggleTheme()">
        <span class="db-nav-icon">{{ (isDarkMode$ | async) ? '☀️' : '🌙' }}</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">
          {{ (isDarkMode$ | async) ? 'Light Mode' : 'Dark Mode' }}
        </span>
      </button>
      
      <button class="db-nav-item" (click)="logout()">
        <span class="db-nav-icon">🚪</span>
        <span class="db-nav-label" *ngIf="!sidebarCollapsed">Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="db-content">
    <router-outlet></router-outlet>
  </main>
</div>
