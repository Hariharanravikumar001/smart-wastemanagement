<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/"><i class="bi bi-recycle text-success me-2"></i>WasteZero</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        </li>
        <ng-container *ngIf="!currentUser">
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">Login</a>
          </li>
          <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
            <a class="btn btn-success btn-sm px-3 rounded-pill" routerLink="/register">Sign Up</a>
          </li>
        </ng-container>
        <ng-container *ngIf="currentUser">
          <!-- Main links moved to Dashboard Sidebar -->
          <li class="nav-item ms-lg-3 mt-2 mt-lg-0 dropdown">
            <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center me-2" style="width: 30px; height: 30px;">
                {{ currentUser.name.charAt(0).toUpperCase() }}
              </div>
              {{ currentUser.name }}
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="navbarDropdown">
              <li><a class="dropdown-item" routerLink="/dashboard"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
              <li *ngIf="currentUser.role === 'User' || currentUser.role === 'Citizen'"><a class="dropdown-item" routerLink="/pickup-request"><i class="bi bi-truck me-2"></i>Schedule Pickup</a></li>
              <li *ngIf="currentUser.role === 'Admin'"><a class="dropdown-item" routerLink="/admin"><i class="bi bi-shield-check me-2"></i>Admin Panel</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="#" (click)="$event.preventDefault(); logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
            </ul>
          </li>
        </ng-container>
      </ul>
    </div>
  </div>
